name: Fedora/Rawhide

on:
  workflow_dispatch:
  schedule:
  - cron: "0 0 * * *"

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    strategy:
      matrix:
        cc: [ gcc, clang ]
    name: ${{ matrix.cc }}
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'libressl' || github.event_name != 'schedule' }}
    container:
      image: fedora:rawhide@sha256:8b838b3253cb855b1e5c3e1366fd0cda28cd1cc4c3517d625847172fd4ac6869
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install dependencies
      run: |
        dnf -y install git make clang cmake ninja-build autoconf automake libtool diffutils patch gawk
    - name: Pull upstream source
      run: |
        ./update.sh
    - name: Build
      run: |
         CC=${{ matrix.cc }} cmake -GNinja -DBUILD_SHARED_LIBS=ON .
         ninja
    - name: Test
      run: |
         ninja test
