# GitHub Actions workflow to run tests on Windows.
name: "Windows"

on:
  push: {}
  pull_request: {}
  schedule:
    - cron: "0 0 * * 0" # At 00:00 weekly on Sunday.

concurrency:
  group: "${{ github.workflow }}-${{ github.event.number || github.ref }}"
  cancel-in-progress: true

jobs:
  test:
    name: "${{ matrix.os }}/${{ matrix.arch }} (${{ matrix.shared == 'ON' && 'shared' || 'static' }})"
    runs-on: "${{ matrix.os }}"
    if: ${{ github.repository_owner == 'libressl' || github.event_name != 'schedule' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: ["windows-2022", "windows-2025"]
        arch: ["ARM64", "x64", "Win32"]
        shared: ["ON", "OFF"]
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Setup MSYS2"
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          update: true
          install: >-
            diffutils
            gcc
            git
            patch
            perl

      - name: "Update"
        shell: msys2 {0}
        run: ./update.sh

      - name: "Configure CMake"
        shell: pwsh
        run: |
          $generator = cmake --help |
            Select-String '^\s*\*?\s*(Visual Studio \d+ \d+)' |
            Select-Object -First 1 |
            ForEach-Object { $_.Matches[0].Groups[1].Value }
          if (-not $generator) {
            throw "No Visual Studio CMake generator found"
          }
          Write-Host "Using generator: $generator"
          cmake -Bbuild -G "$generator" -A ${{ matrix.arch }} -D BUILD_SHARED_LIBS=${{ matrix.shared }} -D CMAKE_INSTALL_PREFIX=../local

      - name: "Build"
        shell: cmd
        run: cmake --build build --config Release

      - name: "Test"
        if: matrix.arch != 'ARM64'
        shell: cmd
        run: ctest --test-dir build -C Release --output-on-failure

      - name: "Upload build artifacts"
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "${{ matrix.os }}-${{ matrix.arch }}${{ matrix.shared == 'ON' && '-shared' || '' }}-build-results"
          path: "build"
